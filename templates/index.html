<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartAI — web-search assistant</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #0f1115; color: #e7e9ee; }
    header { padding: 16px 20px; background: #161922; border-bottom: 1px solid #262b38; font-weight: 600; }
    header span { color: #7c9cff; }
    #chat { max-width: 760px; margin: 0 auto; padding: 20px; padding-bottom: 110px; }
    .msg { margin: 14px 0; display: flex; }
    .msg .bubble { padding: 12px 16px; border-radius: 14px; line-height: 1.5; white-space: pre-wrap; max-width: 80%; }
    .user { justify-content: flex-end; }
    .user .bubble { background: #2b5cff; color: #fff; border-bottom-right-radius: 4px; }
    .ai .bubble { background: #1c2030; border: 1px solid #2a3043; border-bottom-left-radius: 4px; }
    form { position: fixed; bottom: 0; left: 0; right: 0; background: #161922; border-top: 1px solid #262b38; padding: 14px; display: flex; gap: 10px; }
    .row { max-width: 760px; margin: 0 auto; width: 100%; display: flex; gap: 10px; }
    input { flex: 1; padding: 12px 14px; border-radius: 10px; border: 1px solid #2a3043; background: #0f1115; color: #e7e9ee; font-size: 15px; }
    button { padding: 12px 18px; border-radius: 10px; border: none; background: #2b5cff; color: #fff; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .5; cursor: default; }
    .hint { color: #8a90a2; font-size: 13px; }
  </style>
</head>
<body>
  <header>Smart<span>AI</span> — live web search is ON 🔍</header>
  <div id="chat">
    <div class="msg ai"><div class="bubble">Hi! I'm SmartAI. Ask me anything — I can search the live web to give you fresh, accurate answers.</div></div>
  </div>
  <form id="form">
    <div class="row">
      <input id="input" autocomplete="off" placeholder="Ask me anything..." />
      <button id="send" type="submit">Send</button>
    </div>
  </form>
  <script>
    const chat = document.getElementById('chat');
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const send = document.getElementById('send');

    function add(text, who) {
      const wrap = document.createElement('div');
      wrap.className = 'msg ' + who;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;
      wrap.appendChild(bubble);
      chat.appendChild(wrap);
      window.scrollTo(0, document.body.scrollHeight);
      return bubble;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      add(message, 'user');
      input.value = '';
      send.disabled = true;
      const thinking = add('Thinking…', 'ai');
      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await res.json();
        thinking.textContent = data.reply || '(no reply)';
      } catch (err) {
        thinking.textContent = 'Error: ' + err;
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
